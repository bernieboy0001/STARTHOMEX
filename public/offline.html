<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HOMEX Offline</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, sans-serif; color: #edf7f3; background: #0d1412; }
      main { width: min(520px, calc(100% - 32px)); }
      img { width: 112px; border-radius: 16px; background: white; }
      h1 { margin: 24px 0 10px; font-size: 2rem; }
      p { color: #a8bbb3; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main>
      <img src="/homex-logo.png" alt="HOMEX" />
      <h1>You are offline</h1>
      <p>HOMEX needs internet to save changes. The latest saved snapshot on this phone is shown below when available.</p>
      <section id="emergency"></section>
      <section id="snapshot"></section>
    </main>
    <script>
      const target = document.getElementById("emergency");
      try {
        const raw = localStorage.getItem("homex-offline-emergency");
        if (raw && target) {
          const data = JSON.parse(raw);
          const meds = (data.medications || []).map(item => `<li>${item.name} ${item.dosage || ""} - ${item.schedule}</li>`).join("");
          const contacts = (data.contacts || []).map(item => `<li>${item.name} (${item.role}) ${item.phone || item.email || ""}</li>`).join("");
          target.innerHTML = `
            <h2>Offline emergency snapshot</h2>
            <p><strong>${data.recipient.full_name}</strong></p>
            <p>${data.recipient.emergency_summary || "No emergency summary saved."}</p>
            <p>Fall risk: ${data.recipient.fall_risk || "Unknown"}</p>
            <h3>Medications</h3><ul>${meds || "<li>No saved medications</li>"}</ul>
            <h3>Contacts</h3><ul>${contacts || "<li>No saved contacts</li>"}</ul>
            <p>Saved: ${new Date(data.savedAt).toLocaleString()}</p>
          `;
        }
      } catch {}
      const snapshotTarget = document.getElementById("snapshot");
      try {
        const raw = localStorage.getItem("homex-offline-dashboard");
        if (raw && snapshotTarget) {
          const data = JSON.parse(raw);
          const tasks = (data.tasks || []).filter(item => !item.completed_at).slice(0, 6).map(item => `<li>${item.title} ${item.owner_name ? "- " + item.owner_name : ""}</li>`).join("");
          const visits = (data.visits || []).slice(0, 4).map(item => `<li>${item.title} ${item.starts_at ? "- " + new Date(item.starts_at).toLocaleString() : ""}</li>`).join("");
          const reminders = (data.reminders || []).slice(0, 4).map(item => `<li>${item.title} - ${new Date(item.remind_at).toLocaleString()}</li>`).join("");
          const notes = (data.notes || []).slice(0, 4).map(item => `<li>${item.author_name}: ${item.body}</li>`).join("");
          snapshotTarget.innerHTML = `
            <h2>Latest circle snapshot</h2>
            <h3>Open tasks</h3><ul>${tasks || "<li>No open tasks saved</li>"}</ul>
            <h3>Visits</h3><ul>${visits || "<li>No visits saved</li>"}</ul>
            <h3>Reminders</h3><ul>${reminders || "<li>No reminders saved</li>"}</ul>
            <h3>Recent notes</h3><ul>${notes || "<li>No notes saved</li>"}</ul>
          `;
        }
      } catch {}
    </script>
  </body>
</html>
